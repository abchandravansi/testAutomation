[pytest]

# -------------------------------
# Test Discovery
# -------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -------------------------------
# Output & Logging
# -------------------------------
addopts = 
    -v
    --tb=short
    --disable-warnings
    --html=reports/report.html
    --self-contained-html

log_cli = true
log_cli_level = INFO

# -------------------------------
# Markers (for tagging tests)
# -------------------------------
markers =
    smoke: quick smoke tests
    regression: full regression suite
    web: web tests
    mobile: mobile tests
    api: api tests

# -------------------------------
# Timeout (optional if plugin used)
# -------------------------------
# timeout = 60

# -------------------------------
# Parallel Execution (if using pytest-xdist)
# -------------------------------
# addopts = -n auto

# -------------------------------
# Custom Environment Variables (optional)
# -------------------------------
env =
    ENV=local
    PLATFORM=web